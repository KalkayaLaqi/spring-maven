name: Spring Boot CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build, Test, Sonar & Nexus
    runs-on: self-hosted
    steps:
      # 1. Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Build + Tests
      - name: Build with Maven
        run: mvn clean verify


      - name: SonarQube Analysis
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=springboot-app \
            -Dsonar.host.url=http://192.168.56.133:9000\
            -Dsonar.login=squ_953d0df91477fe33771033d8bf150721cabae8c7
      - name: Debug Maven
        run: |
          echo "=== .m2 ==="
          ls -la ~/.m2
          echo "=== settings.xml ==="
          cat ~/.m2/settings.xml


      # 5. Publier vers Nexus (uniquement sur main)
      - name: Publish to Nexus
        if: github.ref == 'refs/heads/main'
        run: mvn deploy -DskipTests
        env:
          NEXUS_USER: 'admin'
          NEXUS_PASSWORD: '4682e882-e39f-4fd5-a1fa-7bbdf820acde'

      # 6. Upload l'artefact JAR
      - name: Upload JAR artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: target/*.jar

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-jar
          path: target

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: Build & Push Docker image
        run: |
          docker build -t ${{secrets.DOCKERHUB_USERNAME}}/springboot-app:latest .
          docker push ${{secrets.DOCKERHUB_USERNAME}}/springboot-app:latest
